<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strážci – přehled epizod</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff;
  --card: #fff;
  --border: #e0e0e0;
  --accent: #1565c0;
  --accent-light: #e3f2fd;
  --text: #212121;
  --text-muted: #757575;
  --tag-bg: #f0f0f0;
  --radius-lg: 12px;
  --radius: 8px;
  --radius-sm: 4px;
  --shadow-1: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --shadow-2: 0 3px 6px rgba(0,0,0,0.15), 0 2px 4px rgba(0,0,0,0.10);
  --shadow-3: 0 10px 20px rgba(0,0,0,0.15), 0 3px 6px rgba(0,0,0,0.10);
  --ease: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding-bottom: 4rem;
  -webkit-font-smoothing: antialiased;
}
/* App layout — nav rail + main */
.app-layout {
  display: flex;
  min-height: calc(100vh - 200px);
}
.nav-rail {
  position: sticky;
  top: 0;
  width: 160px;
  min-width: 160px;
  height: 100vh;
  overflow-y: auto;
  background: var(--card);
  border-right: 1px solid var(--border);
  z-index: 100;
  scrollbar-width: thin;
}
.nav-rail::-webkit-scrollbar { width: 4px; }
.nav-rail::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
.nav-rail-inner {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  padding: 0.5rem;
}
.main-content {
  flex: 1;
  min-width: 0;
  padding: 0 clamp(1rem, 3vw, 3rem);
}

/* Header */
header {
  background: var(--card);
  color: var(--text);
  padding: 1.5rem 0 1.25rem;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
}
.header-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  margin-bottom: 0.75rem;
}
.header-logo {
  flex: 1;
  max-height: 100px;
  width: auto;
  object-fit: contain;
  object-position: right;
}
.header-img {
  flex: 1;
  max-height: 140px;
  width: auto;
  object-fit: contain;
  object-position: left;
}
header .subtitle { color: var(--text-muted); font-size: 1rem; font-weight: 300; margin-top: 0.25rem; text-align: center; letter-spacing: 0.01em; }

/* Controls bar */
.controls {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding: 0.75rem 0;
  z-index: 50;
  margin-bottom: 0.75rem;
}
.pub-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.35rem;
  border: 2px solid transparent;
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--pub-color, var(--card)) 30%, white);
  cursor: pointer;
  transition: all var(--ease);
  width: 100%;
  opacity: 0.75;
}
.pub-tab:hover { opacity: 0.9; background: color-mix(in srgb, var(--pub-color, var(--card)) 50%, white); }
.pub-tab.active {
  border-color: var(--pub-color, var(--accent));
  opacity: 1;
  background: var(--pub-color, var(--accent-light));
}
.pub-tab img {
  width: 100%;
  max-height: 160px;
  object-fit: contain;
  border-radius: var(--radius-sm);
  margin-bottom: 0.15rem;
}
.pub-tab .pub-tab-label {
  font-size: 0.55rem;
  font-weight: 500;
  text-align: center;
  line-height: 1.15;
  color: var(--text);
}
.pub-tab-years {
  font-size: 0.55rem;
  color: var(--text-muted);
  margin-top: 0.1rem;
}
.pub-tab-count {
  font-size: 0.5rem;
  color: var(--text-muted);
  margin-top: auto;
  padding-top: 0.1rem;
}
.pub-tab-all {
  justify-content: center;
  font-weight: 500;
  color: var(--text);
  padding: 0.5rem 0.35rem;
}
.pub-tab-all .pub-tab-label {
  font-size: 0.7rem;
}
.search-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.search-box {
  flex: 1;
  padding: 0.6rem 1rem;
  border: 1px solid var(--border);
  border-radius: 28px;
  font-size: 0.9rem;
  font-family: inherit;
  background: var(--card);
  transition: border-color var(--ease);
}
.search-box:focus { outline: none; border-color: var(--accent); }
.artist-filters {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.artist-filters-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 400;
  white-space: nowrap;
}
.artist-chips {
  display: flex;
  gap: 0.4rem;
}
.artist-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.4rem 0.85rem;
  border: 1px solid color-mix(in srgb, var(--artist-color, var(--border)) 60%, transparent);
  border-radius: 20px;
  background: color-mix(in srgb, var(--artist-color, var(--card)) 30%, white);
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 400;
  font-family: inherit;
  color: var(--text);
  transition: all var(--ease);
  height: 2rem;
}
.artist-btn:hover { background: var(--artist-color, rgba(0,0,0,0.04)); border-color: color-mix(in srgb, var(--artist-color, #bdbdbd) 80%, #333); }
.artist-btn .chip-check {
  display: none;
  font-size: 0.75rem;
  line-height: 1;
}
.artist-btn.active {
  background: var(--artist-color, #e3f2fd);
  border-color: color-mix(in srgb, var(--artist-color, var(--accent)) 70%, #333);
  font-weight: 500;
  padding-left: 0.6rem;
}
.artist-btn.active .chip-check { display: inline; }
.artist-btn.active:hover { background: color-mix(in srgb, var(--artist-color, var(--accent)) 80%, white); }

/* Facts section */
.facts-section {
  padding: 1rem 0 0.5rem;
}
.facts-title {
  font-size: 1.1rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
}
.fact-card {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--text);
  padding: 0.75rem 1rem;
  margin-bottom: 0.5rem;
  border-left: 3px solid var(--accent);
  background: var(--accent-light);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.fact-list {
  margin: 0.5rem 0 0 1.5rem;
  padding: 0;
}
.fact-list li {
  margin-bottom: 0.25rem;
}
.fact-link {
  color: var(--text);
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  padding: 0.1rem 0.35rem;
  border-radius: var(--radius-sm);
  border-bottom: 1.5px dashed rgba(0,0,0,0.3);
  transition: all var(--ease);
}
.fact-link:hover {
  border-bottom-style: solid;
  filter: brightness(0.92);
}

/* Stats bar */
.stats {
  font-size: 0.875rem;
  font-weight: 400;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  padding: 0.5rem 0;
}

/* Episode list */
.episode-item {
  background: var(--ep-color, var(--card));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.75rem;
  overflow: hidden;
  transition: background var(--ease);
}
.episode-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  cursor: pointer;
  user-select: none;
  transition: background var(--ease);
  border-radius: var(--radius);
}
.episode-header:hover { background: rgba(0,0,0,0.04); }
.ep-number {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
  min-width: 2.5rem;
  text-align: right;
}
.ep-title { font-weight: 500; flex: 1; font-size: 0.95rem; }
.ep-artist-short {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  min-width: 2em;
  padding: 0.15rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: #e5e7eb; /* fallback, overridden by inline artist color */
}
.ep-scr-dots {
  display: inline-flex;
  gap: 3px;
  align-items: center;
  margin-left: auto;
}
.ep-scr-dot {
  display: inline-block;
  width: 18px;
  height: 18px;
  border-radius: 4px;
  border: 1.5px solid rgba(0,0,0,0.25);
}
.ep-variant-tag {
  font-weight: 400;
  font-size: 0.75rem;
  color: var(--accent);
  font-style: italic;
}
.ep-toggle {
  color: var(--text-muted);
  font-size: 1rem;
  transition: transform var(--ease);
}
.ep-toggle.open { transform: rotate(90deg); }

/* Episode detail */
.episode-detail {
  display: none;
  padding: 1rem;
  border-top: 1px solid rgba(0,0,0,0.08);
  background: #fafafa;
  position: relative;
  border-radius: 0 0 var(--radius) var(--radius);
}
.episode-detail.open { display: block; }

.detail-section { margin-bottom: 0.75rem; }
.detail-section:last-child { margin-bottom: 0; }
.detail-label {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
  letter-spacing: 0.05em;
}
.detail-value { font-size: 0.875rem; }

/* Publications table in detail */
.pub-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.pub-table th, .pub-table td {
  padding: 0.4rem 0.6rem;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  text-align: left;
}
.pub-table th {
  background: rgba(0,0,0,0.05);
  font-weight: 500;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

/* Episode links */
.ep-link {
  display: inline-block;
  padding: 0.3rem 0.75rem;
  margin: 0.15rem;
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: 16px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
  transition: all var(--ease);
}
.ep-link:hover { background: var(--accent); color: #fff; }

/* Comparison boxes in detail */
.ep-comparisons {
  float: right;
  margin: 0 0 0.5rem 0.75rem;
}

/* Screenshots comparison */
.screenshot-groups {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.screenshot-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 6.5rem;
  height: 6.5rem;
  background: #f0f0f0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--ease);
  text-align: center;
  padding: 0.3rem;
}
.screenshot-row:hover {
  background: rgba(0,0,0,0.06);
}
.screenshot-row .cmp-number {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.screenshot-row .cmp-labels {
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
  line-height: 1.2;
}
.screenshot-row .cmp-arrow {
  color: var(--text-muted);
  font-size: 0.65rem;
}

/* Lightbox / comparison popup */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  cursor: pointer;
}
.lightbox.open { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.lightbox-content {
  padding: 1rem;
  max-width: 95vw;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  cursor: default;
  box-sizing: border-box;
}
.lightbox-item {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: row;
  align-items: center;
}
.lightbox-item img {
  max-height: 100%;
  flex: 1;
  min-width: 0;
  object-fit: contain;
  border: 1px solid #555;
  border-radius: var(--radius-sm);
}
.lightbox-item-label {
  color: #ccc;
  font-size: 0.8rem;
  font-weight: 300;
  writing-mode: vertical-lr;
  text-orientation: mixed;
  padding: 0 0.4rem;
  flex-shrink: 0;
  white-space: nowrap;
}
.lightbox-close {
  position: fixed;
  top: 0.75rem;
  right: 1rem;
  color: #fff;
  font-size: 2rem;
  cursor: pointer;
  z-index: 1001;
  line-height: 1;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  width: 2.5rem;
  height: 2.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--ease);
}
.lightbox-close:hover { background: rgba(255,255,255,0.25); }


/* Publication view heading */
.pub-view-heading {
  font-size: 1.25rem;
  font-weight: 500;
  margin-bottom: 0.75rem;
  padding: 0.5rem 0;
  border-bottom: 3px solid var(--accent);
  border-radius: 2px;
}

/* Responsive — tablet */
@media (max-width: 900px) {
  .nav-rail { width: 120px; min-width: 120px; }
  .pub-tab img { max-height: 70px; }
  .pub-tab .pub-tab-label { font-size: 0.5rem; }
  .pub-tab-all .pub-tab-label { font-size: 0.6rem; }
  .header-logo { max-height: 70px; }
  .header-img { max-height: 100px; }
  .screenshot-row { width: 5.5rem; height: 5.5rem; }
  .screenshot-row .cmp-number { font-size: 1.4rem; }
}

/* Responsive — mobile */
@media (max-width: 600px) {
  .app-layout { flex-direction: column; }
  .nav-rail {
    position: sticky;
    top: 0;
    width: 100%;
    min-width: 100%;
    height: auto;
    overflow-x: auto;
    overflow-y: hidden;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .nav-rail-inner {
    flex-direction: row;
    flex-wrap: nowrap;
    padding: 0.4rem;
    gap: 0.3rem;
  }
  .pub-tab {
    min-width: 70px;
    width: auto;
    flex-shrink: 0;
    padding: 0.25rem;
    border-radius: var(--radius-sm);
  }
  .pub-tab img { max-height: 50px; border-radius: 4px; }
  .pub-tab .pub-tab-label { font-size: 0.45rem; }
  .pub-tab-count { font-size: 0.4rem; }
  .pub-tab-all { padding: 0.3rem 0.5rem; min-width: 55px; }
  .pub-tab-all .pub-tab-label { font-size: 0.55rem; }
  .main-content { padding: 0 0.75rem; }
  .header-banner { gap: 0.75rem; }
  .header-logo { max-height: 50px; }
  .header-img { max-height: 70px; }
  header .subtitle { font-size: 0.8rem; }
  .search-row { flex-direction: column; gap: 0.4rem; }
  .search-box { width: 100%; border-radius: var(--radius); }
  .artist-filters { flex-wrap: wrap; justify-content: center; }
  .artist-chips { flex-wrap: wrap; }
  .artist-filters-label { display: none; }
  .episode-item { border-radius: var(--radius-sm); margin-bottom: 0.5rem; }
  .episode-header { padding: 0.5rem 0.75rem; gap: 0.5rem; }
  .ep-title { font-size: 0.85rem; }
  .ep-number { min-width: 2rem; font-size: 0.7rem; }
  .ep-artist-short { font-size: 0.6rem; padding: 0.1rem 0.35rem; }
  .ep-scr-dot { width: 14px; height: 14px; }
  .episode-detail { padding: 0.75rem; }
  .ep-comparisons { float: none; margin: 0 0 0.75rem 0; }
  .screenshot-row { width: 5rem; height: 5rem; }
  .screenshot-row .cmp-number { font-size: 1.2rem; }
  .screenshot-row .cmp-labels { font-size: 0.5rem; }
  .lightbox-content { padding: 0.5rem; max-width: 100vw; }
  .pub-table { font-size: 0.75rem; }
  .pub-table th, .pub-table td { padding: 0.25rem 0.35rem; }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-banner">
      <img class="header-logo" src="strazci_logo.png" alt="Strážci – logo">
      <img class="header-img" src="strazci_heads.png" alt="Strážci – postavy">
    </div>
    <div class="subtitle">Přehled epizod komiksu Strážci (1967–2021)</div>
  </div>
</header>

<div class="app-layout">
  <nav class="nav-rail" id="navRail">
    <div class="nav-rail-inner" id="pubTabs"></div>
  </nav>
  <main class="main-content">
    <div class="facts-section" id="factsSection"></div>
    <div class="controls">
      <div class="search-row">
        <input type="text" class="search-box" id="searchBox" placeholder="Hledat epizodu...">
        <div class="artist-filters" id="artistFilters"></div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div id="episodeList"></div>
  </main>
</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <div class="lightbox-content" id="lightboxContent"></div>
</div>

u zajímavé tím, že [filter:artist=kobik+pub=p03+hasScreenshots=yes|# z nich obsahuje zdokumentované změny] v textu a kresbě oproti vlastním verzím vyšlým v ABC, snažící se popřít původní socialistický obsah (např. odkazy na Pionýrskou organizaci nebo barvu jejich uniforem)."},{"text":"[artist:kobik|Kobíkovy] upravené verze z [pub:p03|Velké knihy Strážců] se snaží zejména přebarvit pionýrské uniformy. Nejkomičtěji působí asi pokus z epizody [ep:e092-vks|Výstavka déček], kde se šátky snaží fyzicky odmazat. Typicky to pak byly spíš košile přebarvené na hnědo a zatmavené šátky, např. v [ep:e167-vks|Den plný soutěží (1)], [ep:e120-vks|Hlídač exponátů (2)] nebo [ep:e154-vks|Po stopách Práčat (2)]."},{"text":"Co se týče úprav textu, u [artist:kobik|Kobíkových] upravených verzí jsou většinou běžné změny jako oslovení „soudruhu\" na „pane\", MNV na „obec\", občanský výbor na „místní\" nebo bezpečnost na „policii\". Občas se ale najdou i věcné opravy či kuriozity:","items":["U epizody [ep:e127|Romantici] byl v upravené verzi [ep:e127-vks|Zachráněné zbraně (4)] opraven popis staré zbraně ze „zadovky\" na „předovku\".","U epizody [ep:e129|Patroni srdečně zvou] byl v upravené verzi [ep:e129-vks|Lesní brigáda (1)] změněn text na nástěnce z „Patronátní skupina SSM zve své mladší kamarády\" na „Skupina Brontosaurus zve\".","V dílu [ep:e167|Velká paráda] Robin kreslí plakát „Den pionýrů\" s pionýrským znakem. V upravené verzi [ep:e167-vks|Den plný soutěží (1)] je znak nahrazen kytičkou a nápis „Den pionýrů\" vymazán.","V původní epizodě [ep:e176|Vzpomínky pro dnešek] se vzpomíná na partyzány. V upravené verzi [ep:e176-vks|Tajemství Hrádku (3)] se ze „sovětské armády\" stali „spojenci\" a text o jubilejním roku oslav osvobození naší vlasti sovětskou armádou byl zredukován na jiný.","V upravené verzi epizody [ep:e152|I když se nefilmuje], tj. [ep:e152-vks|Vzhůru na palubu (4)] z Velké knihy Strážců, je „soudruhu Králi\" vtipně předěláno na „veličenstvo Králi\"."]},{"text":"Nejznámější změnou je přejmenování patronů Mirka Duška a Jarky Motlíka, protože příliš připomínali jména z Rychlých šípů. Z Duška se stal Bouček a z Motlíka Král.","items":["V epizodě [ep:e028|Ostrov Lincolnův] je příkladem podpis v dopise.","V epizodě [ep:e041|K jižnímu pólu] je v originále zmíněn pan Dušek a pan Motlík. V [ep:e041-abc2|upravené verzi Kovaříkové] se Dušek změnil na soudruha Duška a Motlík zmizel úplně. V [ep:e213|Kobíkově předělávce] je na stejném místě zmíněn už Mirek Bouček.","V epizodě [ep:e032|Zkáza ostrova] je Motlík jak v originále, tak v [ep:e210|Kobíkově remaku], ale v originále je „z klubu Mirka Duška\" a u Kobíka už „z klubu Boučka\". Král se z Motlíka stal až v pozdějších epizodách Kobíka. Příkladem výskytu Krále je epizoda [ep:e152|I když se nefilmuje]."]},{"text":"U [artist:kovarikova|Kovaříkové] upravených verzí z [pub:p02|ABC (opakování)] jsou změny převážně textové – nejčastěji přejmenování Jendy Drábka na Honzu, „klub\" na „oddíl\" nebo „partu\", dále úpravy dialogů a popisků. Některé jsou ale překvapivé:","items":["V dílu [ep:e034|Král draků] je v upravené verzi [ep:e034-abc2|Zrzek nedobrovolným letcem] nahrazen „bobřík síly\" za „důkaz síly\".","V dílu [ep:e070|Strážci hledají „poklady\"] je v upravené verzi [ep:e070-abc2|Objev s překvapením] původní „hotový Stínadla z televizní Záhady hlavolamu\" nahrazeno za „zpustlá džungle jako z detektivky\" – další příklad snahy eliminovat náznaky foglarismu. Zajímavé je, že v jiném okénku téhož dílu byla zmínka o Vontech ponechána.","V dílu [ep:e066|Neuvěřitelná příhoda] bylo v [ep:e066-abc2|opakování] zaměněno Zrzkovo zaklení „Kristovanoho\" za „Prokrindáčka\" – možná i proto, že „Kristovanoho\" bylo typické zaklení z foglarovských Rychlých šípů.","V dílu [ep:e060|Na půdě straší] bylo v [ep:e060-abc2|opakování] původní „hurtovnice\" nahrazeno za „minikáry\".","V dílu [ep:e064|Lest Rangerů] byla v [ep:e064-abc2|opakování (Pomsta Rangerů)] nahrazena zmínka o Slovance a Petrovu (která identifikuje, že se děj Strážců odehrává v Plzni) za neurčité „kamarádíčky\".","V dílu [ep:e045|Strážci a UFO] jsou v upravené verzi [ep:e045-abc2|Aprílová příhoda] „přístroje\" nahrazeny za „nádrže\"."]},{"text":"Celkem [filter:isOriginal=yes+artist=kobik+inPubs=p04,p05,p07+notInPubs=p06,p08,p09+hasVariant=yes|#:epizoda:epizody:epizod] od [artist:kobik|Františka Kobíka] existuje v původní „předrevoluční\" verzi pouze v [pub:p01|ABC] nebo jeho [pub:p04|Letním speciálu 87] či [pub:p07|Letním speciálu 89] – do modernějších souhrnných publikací ([pub:p06|Velká kniha komiksů 4], [pub:p08|Strážci (1.] a [pub:p09|2. vydání)]) se dostaly už jen jejich upravené verze z [pub:p03|Velké knihy Strážců]."},{"text":"Podobně jako u Kobíka existuje [filter:isOriginal=yes+artist=kovarikova+notInPubs=p04,p05,p06,p07,p08,p09+hasVariant=yes|#:epizoda:epizody:epizod] od [artist:kovarikova|Libuše Kovaříkové], jejichž originální verze vyšla pouze v [pub:p01|ABC]. Do všech novějších publikací se dostaly jen jejich upravené verze z [pub:p02|ABC (opakování)]."},{"text":"Pokud by někdo chtěl vlastnit všechny verze epizod v souhrnných publikacích, tj. bez nutnosti vlastnit jednotlivá čísla ABC, tak nemůže, protože existují 2 epizody – [ep:e086|Strašidla] a [ep:e088|Vánoce] – které mají upravenou verzi vyšlou v souhrnných publikacích (konkrétně [pub:p03|Velká kniha Strážců]), ale originální verze vyšla pouze v ABC."},{"text":"Jediné [artist:petracek|#:epizoda:epizody:epizod] od [artist:petracek|Jiřího Petráčka] vyšly pouze v publikacích [pub:p08|Strážci 1. vydání] a [pub:p09|2. vydání] od nakladatelství Josef Vybíral."}]};

  // Handle URL hash on load
  if (window.location.hash) {
    const targetId = window.location.hash.slice(1);
    if (DATA.episodes[targetId]) {
      setTimeout(() => navigateToEpisode(targetId), 100);
    }
  }

  // Handle hash changes (browser back/forward)
  window.addEventListener('hashchange', () => {
    const targetId = window.location.hash.slice(1);
    if (targetId && DATA.episodes[targetId]) {
      navigateToEpisode(targetId);
    }
  });
}

// --- Match episodes against filter spec ---
function matchFilter(filterSpec) {
  var parts = filterSpec.split('+');
  var conds = {};
  parts.forEach(function(p) { var kv = p.split('='); conds[kv[0]] = kv[1]; });
  var matched = [];
  Object.entries(DATA.episodes).forEach(function(e) {
    var id = e[0], ep = e[1];
    var ok = true;
    if (conds.variantType && ep.variantType !== conds.variantType) ok = false;
    if (conds.artist && ep.artist !== conds.artist) ok = false;
    if (conds.origArtist) {
      if (!ep.originalId || !DATA.episodes[ep.originalId] || DATA.episodes[ep.originalId].artist !== conds.origArtist) ok = false;
    }
    if (conds.pub) {
      if (!DATA.contents.some(function(c) { return c.episodeId === id && c.publicationId === conds.pub; })) ok = false;
    }
    if (conds.storyArc && ep.storyArc !== conds.storyArc) ok = false;
    if (conds.hasScreenshots === 'yes' && (!ep.screenshots || ep.screenshots.length === 0)) ok = false;
    if (conds.hasScreenshots === 'no' && ep.screenshots && ep.screenshots.length > 0) ok = false;
    if (conds.isOriginal === 'yes' && (ep.originalId || ep.variantType)) ok = false;
    if (conds.isOriginal === 'no' && !ep.originalId && !ep.variantType) ok = false;
    if (conds.hasVariant === 'yes' && !Object.values(DATA.episodes).some(function(v) { return v.originalId === id; })) ok = false;
    if (conds.inPubs) {
      var pubs = DATA.contents.filter(function(c) { return c.episodeId === id; }).map(function(c) { return c.publicationId; });
      var required = conds.inPubs.split(',');
      if (!required.some(function(rp) { return pubs.includes(rp); })) ok = false;
    }
    if (conds.notInPubs) {
      var pubs2 = DATA.contents.filter(function(c) { return c.episodeId === id; }).map(function(c) { return c.publicationId; });
      var excluded = conds.notInPubs.split(',');
      if (excluded.some(function(ep2) { return pubs2.includes(ep2); })) ok = false;
    }
    if (ok) matched.push(id);
  });
  return matched;
}

// --- Parse fact text (replace [action:param|label] links) ---
function parseFactText(text) {
  return text.replace(/\[([^\]]+)\]/g, function(match, inner) {
    var parts = inner.split('|');
    var actionStr = parts[0];
    var label = parts[1] || '';
    var actionParts = actionStr.split(':');
    var action = actionParts[0];
    var param = actionParts.slice(1).join(':');

    if (label.indexOf('#') !== -1) {
      var count;
      if (action === 'filter') count = matchFilter(param).length;
      else if (action === 'pub') count = DATA.contents.filter(function(c) { return c.publicationId === param; }).length;
      else if (action === 'artist') count = Object.values(DATA.episodes).filter(function(ep) { return ep.artist === param; }).length;
      else count = 0;
      label = label.replace(/#(?::([^:s|]+):([^:s|]+):([^:s|]+))?/g, function(m, sg, pa, pl) {
        if (sg) {
          var form = count === 1 ? sg : (count >= 2 && count <= 4 ? pa : pl);
          return count + ' ' + form;
        }
        return count;
      });
    }

    var linkColor = '';
    if (action === 'pub') linkColor = PUB_COLORS[param] || '';
    else if (action === 'artist') linkColor = ARTIST_COLORS[param] || '';
    else if (action === 'ep') {
      if (param.endsWith('-abc2')) {
        linkColor = PUB_COLORS['p02'] || '';
      } else {
        var epContent = DATA.contents
          .filter(function(c) { return c.episodeId === param; })
          .sort(function(a, b) {
            var ya = a.date ? parseInt(a.date.split('-')[0]) : (DATA.publications[a.publicationId] ? DATA.publications[a.publicationId].year || 9999 : 9999);
            var yb = b.date ? parseInt(b.date.split('-')[0]) : (DATA.publications[b.publicationId] ? DATA.publications[b.publicationId].year || 9999 : 9999);
            return ya - yb;
          })[0];
        if (epContent) linkColor = PUB_COLORS[epContent.publicationId] || '';
      }
    } else if (action === 'filter') {
      var fp = {};
      param.split('+').forEach(function(p) { var kv = p.split('='); fp[kv[0]] = kv[1]; });
      if (fp.pub) linkColor = PUB_COLORS[fp.pub] || '';
      else if (fp.artist) linkColor = ARTIST_COLORS[fp.artist] || '';
    }
    var linkStyle = linkColor ? ' style="background:' + linkColor + ';border-bottom-color:color-mix(in srgb,' + linkColor + ' 70%,#333)"' : '';
    return '<a class="fact-link"' + linkStyle + ' data-fact-action="' + escHtml(action) + '" data-fact-param="' + escHtml(param) + '">' + escHtml(label) + '</a>';
  });
}

// --- Render facts ---
function renderFacts() {
  if (!DATA.facts || DATA.facts.length === 0) return;
  var container = document.getElementById('factsSection');
  var html = '<div class="facts-title">Zajímavosti</div>';
  DATA.facts.forEach(function(fact) {
    var text = parseFactText(fact.text);
    html += '<div class="fact-card">' + text;
    if (fact.items && fact.items.length > 0) {
      html += '<ul class="fact-list">';
      fact.items.forEach(function(item) {
        html += '<li>' + parseFactText(item) + '</li>';
      });
      html += '</ul>';
    }
    html += '</div>';
  });
  container.innerHTML = html;

  // Handle clicks
  container.addEventListener('click', function(e) {
    var link = e.target.closest('.fact-link');
    if (!link) return;
    var action = link.dataset.factAction;
    var param = link.dataset.factParam;

    // Reset all filters first
    customFilter = null;
    artistFilter = null;
    searchQuery = '';
    document.getElementById('searchBox').value = '';
    document.querySelectorAll('.artist-btn').forEach(function(b) { b.classList.remove('active'); });

    if (action === 'pub') {
      currentPub = param;
      document.querySelectorAll('.pub-tab').forEach(function(b) { b.classList.remove('active'); });
      var pubBtn = document.querySelector('.pub-tab[data-pub="' + param + '"]');
      if (pubBtn) pubBtn.classList.add('active');
      renderEpisodes();
    } else if (action === 'artist') {
      artistFilter = param;
      currentPub = 'all';
      document.querySelectorAll('.pub-tab').forEach(function(b) { b.classList.remove('active'); });
      var allBtn = document.querySelector('.pub-tab-all');
      if (allBtn) allBtn.classList.add('active');
      var artBtn = document.querySelector('.artist-btn[data-artist="' + param + '"]');
      if (artBtn) artBtn.classList.add('active');
      renderEpisodes();
    } else if (action === 'ep') {
      currentPub = 'all';
      document.querySelectorAll('.pub-tab').forEach(function(b) { b.classList.remove('active'); });
      var allBtn2 = document.querySelector('.pub-tab-all');
      if (allBtn2) allBtn2.classList.add('active');
      renderEpisodes();
      navigateToEpisode(param);
    } else if (action === 'filter') {
      var matchedIds = matchFilter(param);
      customFilter = function(id) { return matchedIds.indexOf(id) !== -1; };
      currentPub = 'all';
      document.querySelectorAll('.pub-tab').forEach(function(b) { b.classList.remove('active'); });
      var allBtn3 = document.querySelector('.pub-tab-all');
      if (allBtn3) allBtn3.classList.add('active');
      renderEpisodes();
    }
  });
}

function renderPubTabs() {
  const container = document.getElementById('pubTabs');
  var totalEpisodes = Object.keys(DATA.episodes).length;
  let html = '<button class="pub-tab pub-tab-all' + (currentPub === 'all' ? ' active' : '') +

    '<span class="pub-tab-count">' + totalEpisodes + ' dílů</span></button>';
  const sortedPubs = Object.entries(DATA.publications)
    .sort((a, b) => (a[1].year || 0) - (b[1].year || 0));
  for (const [pid, pub] of sortedPubs) {

      ? '<img src="' + pub.cover + '" alt="' + escHtml(pub.name) + '">'
      : '';
    var pubContents = DATA.contents.filter(function(c) { return c.publicationId === pid; });
    var pubCount = pubContents.length;
    var pubYears = [];
    pubContents.forEach(function(c) { if (c.date) pubYears.push(parseInt(c.date.split('-')[0])); });
    if (pubYears.length === 0 && pub.year) pubYears = [pub.year];
    var yearStr = '';
    if (pubYears.length > 0) {
      var minY = Math.min.apply(null, pubYears);
      var maxY = Math.max.apply(null, pubYears);
      yearStr = minY === maxY ? String(minY) : minY + '–' + maxY;
    }
    html += '<button class="pub-tab' + (pid === currentPub ? ' active' : '') +

      (yearStr ? '<span class="pub-tab-years">' + yearStr + '</span>' : '') +
      '<span class="pub-tab-count">' + pubCount + ' dílů</span></button>';
  }
  container.innerHTML = html;

  container.addEventListener('click', (e) => {
    const btn = e.target.closest('.pub-tab');
    if (!btn) return;
    currentPub = btn.dataset.pub;
    artistFilter = null;
    customFilter = null;
    document.querySelectorAll('.artist-btn').forEach(b => b.classList.remove('active'));
    container.querySelectorAll('.pub-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderEpisodes();
  });
}

// --- Get episodes for current view ---
function getEpisodesForView() {
  if (currentPub === 'all') {
    // All episodes sorted by first publication date/year
    return Object.entries(DATA.episodes)
      .map(([id, ep]) => {
        var oldest = DATA.contents
          .filter(function(c) { return c.episodeId === id; })
          .sort(function(a, b) {
            var ya = a.date ? parseInt(a.date.split('-')[0]) * 10000 + parseInt(a.date.split('-')[1]) * 100 + parseInt(a.date.split('-')[2]) :
              (DATA.publications[a.publicationId] ? (DATA.publications[a.publicationId].year || 9999) * 10000 : 99990000);
            var yb = b.date ? parseInt(b.date.split('-')[0]) * 10000 + parseInt(b.date.split('-')[1]) * 100 + parseInt(b.date.split('-')[2]) :
              (DATA.publications[b.publicationId] ? (DATA.publications[b.publicationId].year || 9999) * 10000 : 99990000);
            return ya - yb;
          })[0];
        var sortKey = oldest && oldest.date ? oldest.date :
          (oldest ? String((DATA.publications[oldest.publicationId] || {}).year || 9999) : '9999');
        var isVariant = ep.originalId ? 1 : 0;
        return { id, ep, order: sortKey, isVariant };
      })
      .sort((a, b) => a.order.localeCompare(b.order) || a.isVariant - b.isVariant);
  }

  // Specific publication: get contents, sort by date (magazines) or order (books)
  const pubType = DATA.publications[currentPub] ? DATA.publications[currentPub].type : 'book';
  const pubContents = DATA.contents
    .filter(c => c.publicationId === currentPub)
    .sort((a, b) => {
      if (pubType === 'magazine' && a.date && b.date) return a.date.localeCompare(b.date);
      const oa = a.order || 0;
      const ob = b.order || 0;
      if (oa !== ob) return oa - ob;
      // Same order: original first, variant second
      const va = a.episodeId.includes('-') ? 1 : 0;
      const vb = b.episodeId.includes('-') ? 1 : 0;
      return va - vb;
    });

  return pubContents.map(c => {
    const ep = DATA.episodes[c.episodeId];
    // Find base episode
    const baseId = ep.originalId || c.episodeId;
    const baseEp = DATA.episodes[baseId];
    return {
      id: baseId,
      ep: baseEp,
      contentEpisodeId: c.episodeId,
      content: c,
      order: c.order
    };
  });
}

// --- Filter by search and artist ---
function filterBySearch(items) {
  return items.filter(item => {
    const actualId = item.contentEpisodeId || item.id;
    const actualEp = DATA.episodes[actualId] || item.ep;
    // Custom filter (from facts)
    if (customFilter && !customFilter(actualId, actualEp)) return false;
    // Artist filter
    if (artistFilter && actualEp.artist !== artistFilter) return false;
    // Search filter
    if (!searchQuery) return true;
    const ep = item.ep;
    if (ep.title.toLowerCase().includes(searchQuery)) return true;
    if (ep.storyArc && ep.storyArc.toLowerCase().includes(searchQuery)) return true;
    if (ep.artist && DATA.artists[ep.artist] &&
        DATA.artists[ep.artist].name.toLowerCase().includes(searchQuery)) return true;
    if (item.content && item.content.title.toLowerCase().includes(searchQuery)) return true;
    if (actualEp.title.toLowerCase().includes(searchQuery)) return true;
    return false;
  });
}

// --- Render episode list ---
function renderEpisodes() {
  const items = filterBySearch(getEpisodesForView());
  const container = document.getElementById('episodeList');
  const stats = document.getElementById('stats');

  if (currentPub === 'all') {
    var filtered = searchQuery || artistFilter || customFilter;
    stats.textContent = items.length + ' epizod' + (filtered ? ' (filtrováno)' : '');
  } else {
    const pub = DATA.publications[currentPub];
    var filtered = searchQuery || artistFilter || customFilter;
    stats.textContent = pub.name + ': ' + items.length + ' díl' + (items.length === 1 ? '' : 'ů') +
      (filtered ? ' (filtrováno)' : '');
  }

  container.innerHTML = items.map((item, idx) => renderEpisodeItem(item, idx)).join('');

  // Scroll to episode list if any filter is active
  if (searchQuery || artistFilter || customFilter || currentPub !== 'all') {
    stats.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Attach toggle handlers
  container.querySelectorAll('.episode-header').forEach(h => {
    h.addEventListener('click', () => {
      const detail = h.nextElementSibling;
      const toggle = h.querySelector('.ep-toggle');
      detail.classList.toggle('open');
      toggle.classList.toggle('open');
    });
  });

  // Screenshot row click handlers — open comparison popup
  container.querySelectorAll('.screenshot-row[data-group-id]').forEach(row => {
    row.addEventListener('click', (e) => {
      e.stopPropagation();
      var screens = CMP_GROUPS[row.dataset.groupId];
      if (!screens) return;
      let content = '';
      for (const s of screens) {
        const srcLabel = SOURCE_LABELS[s.source] || s.source;
        content += '<div class="lightbox-item">' +
          '<div class="lightbox-item-label">' + escHtml(srcLabel) + '</div>' +
          '<img src="screenshots/' + s.file + '" alt="' + escHtml(s.source) + '">' +
        '</div>';
      }
      document.getElementById('lightboxContent').innerHTML = content;
      document.getElementById('lightbox').classList.add('open');
      document.getElementById('lightbox').scrollTop = 0;
    });
  });

  // Episode link click handlers
  container.querySelectorAll('.ep-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      navigateToEpisode(link.dataset.target);
    });
  });
}

// --- Navigate to episode by ID ---
function navigateToEpisode(epId) {
  // Switch to "all" view so all episodes are visible
  currentPub = 'all';
  searchQuery = '';
  artistFilter = null;
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('.artist-btn').forEach(b => b.classList.remove('active'));
  renderPubTabs();
  renderEpisodes();

  // Find the episode element and scroll to it
  const el = document.querySelector('.episode-item[data-episode-id="' + epId + '"]');
  if (el) {
    // Expand it
    const detail = el.querySelector('.episode-detail');
    const toggle = el.querySelector('.ep-toggle');
    if (detail && !detail.classList.contains('open')) {
      detail.classList.add('open');
      if (toggle) toggle.classList.add('open');
    }
    // Scroll into view with offset for sticky header
    var ctrl = document.querySelector('.controls');
    var nav = document.querySelector('.nav-rail');
    var headerH = (ctrl ? ctrl.offsetHeight : 0) + (nav && window.innerWidth <= 600 ? nav.offsetHeight : 0);
    var elTop = el.getBoundingClientRect().top + window.scrollY - headerH - 10;
    window.scrollTo({ top: elTop, behavior: 'smooth' });
    // Brief highlight
    el.style.outline = '2px solid #e67e22';
    setTimeout(() => { el.style.outline = ''; }, 2000);
    // Update URL hash
    history.replaceState(null, '', '#' + epId);
  }
}

// --- Render single episode item ---
function renderEpisodeItem(item, idx) {
  // Use the actual episode shown (variant or original)
  const actualId = item.contentEpisodeId || item.id;
  const actualEp = DATA.episodes[actualId] || item.ep;
  const displayOrder = item.content ? item.content.order : (idx + 1);
  var displayTitle, miniNum, displayArc;
  if (item.content) {
    displayTitle = item.content.title;
    miniNum = item.content.miniSeriesNumber;
    displayArc = item.content.storyArc || actualEp.storyArc || null;
  } else {
    // "All" view: use title and miniSeriesNumber from the oldest publication
    var oldest = DATA.contents
      .filter(function(c) { return c.episodeId === actualId; })
      .sort(function(a, b) {
        var ya = a.date ? parseInt(a.date.split('-')[0]) : (DATA.publications[a.publicationId] ? DATA.publications[a.publicationId].year || 9999 : 9999);
        var yb = b.date ? parseInt(b.date.split('-')[0]) : (DATA.publications[b.publicationId] ? DATA.publications[b.publicationId].year || 9999 : 9999);
        return ya - yb;
      })[0];
    displayTitle = oldest ? oldest.title : actualEp.title;
    miniNum = oldest ? oldest.miniSeriesNumber : null;
    displayArc = (oldest ? oldest.storyArc : null) || actualEp.storyArc || null;
  }
  displayTitle = (displayArc ? displayArc + ' – ' : '') + displayTitle + (miniNum ? ' (' + miniNum + ')' : '');
  const artistName = actualEp.artist ? (DATA.artists[actualEp.artist] ? DATA.artists[actualEp.artist].name : actualEp.artist) : '';
  const screenCount = (actualEp.screenshots || []).length;
  // Find color: abc2 variants get abc2 color, others by publication
  var epColor;
  if (actualId.endsWith('-abc2')) {
    epColor = PUB_COLORS['p02'] || '';
  } else {
    var firstPub = item.content ? item.content.publicationId :
      (oldest ? oldest.publicationId : null);
    epColor = firstPub ? PUB_COLORS[firstPub] || '' : '';
  }

  return '<div class="episode-item" data-episode-id="' + actualId + '"' +
    (epColor ? ' style="--ep-color:' + epColor + '"' : '') + '>' +
    '<div class="episode-header">' +
      '<span class="ep-number">' + (displayOrder || '') + '.</span>' +
      (artistName ? '<span class="ep-artist-short"' + (actualEp.artist && ARTIST_COLORS[actualEp.artist] ? ' style="background:' + ARTIST_COLORS[actualEp.artist] + '"' : '') + '>' + escHtml(artistName.substring(0, 3).toUpperCase()) + '</span>' : '') +
      '<span class="ep-title" title="' + actualId + '">' + escHtml(displayTitle) +
        (function() {
          if (!actualEp.variantType) return '';
          var year = null;
          if (item.content && item.content.date) {
            year = item.content.date.split('-')[0];
          } else {
            var app = DATA.contents.find(function(c) { return c.episodeId === actualId; });
            if (app && app.date) {
              year = app.date.split('-')[0];
            } else if (app) {
              var pub = DATA.publications[app.publicationId];
              if (pub && pub.year) year = pub.year;
            }
          }
          var vtLabel = actualEp.variantType === 'remake' ? 'remake' :
                        actualEp.variantType === 'redrawn' ? 'překreslení' : 'upravená verze';
          return ' <span class="ep-variant-tag">(' + vtLabel + ' ' + (year || '?') + ')</span>';
        })() +
      '</span>' +
      (function() {
        var relIds = [actualId];
        if (actualEp.originalId) {
          relIds.push(actualEp.originalId);
          Object.entries(DATA.episodes).forEach(function(e) { if (e[1].originalId === actualEp.originalId && e[0] !== actualId) relIds.push(e[0]); });
        } else {
          Object.entries(DATA.episodes).forEach(function(e) { if (e[1].originalId === actualId) relIds.push(e[0]); });
        }
        var allScr = [];
        for (var ri = 0; ri < relIds.length; ri++) {
          var re = DATA.episodes[relIds[ri]];
          if (!re || !re.screenshots) continue;
          for (var rsi = 0; rsi < re.screenshots.length; rsi++) {
            allScr.push({ file: re.screenshots[rsi].file, source: re.screenshots[rsi].source, episodeId: relIds[ri] });
          }
        }
        var grps = {};
        for (var gi = 0; gi < allScr.length; gi++) {
          var gm = allScr[gi].file.replace('.jpg','').replace('.png','').match(/^(.+?)_(abc2|abc|vks|remake|redrawn)$/);
          var gpfx = gm ? gm[1] : allScr[gi].file;
          if (!grps[gpfx]) grps[gpfx] = [];
          grps[gpfx].push(allScr[gi]);
        }
        var dots = '';
        var gkeys = Object.keys(grps);
        for (var gki = 0; gki < gkeys.length; gki++) {
          var grp = grps[gkeys[gki]];
          if (!grp.some(function(s) { return s.episodeId === actualId; })) continue;
          var targetSrc = grp.length > 1 ? grp.filter(function(s) { return s.episodeId !== actualId; }) : grp;
          var tSrc = targetSrc.length > 0 ? targetSrc[targetSrc.length - 1].source : grp[0].source;
          var tColor = PUB_COLORS[SOURCE_PUB[tSrc]] || '#ccc';
          dots += '<span class="ep-scr-dot" style="background:' + tColor + '"></span>';
        }
        return dots ? '<span class="ep-scr-dots">' + dots + '</span>' : '';
      })() +
      '<span class="ep-toggle">&#x25B6;</span>' +
    '</div>' +
    '<div class="episode-detail" data-ep-id="' + actualId + '">' +
      renderEpisodeDetail(actualId, actualEp, item) +
    '</div>' +
  '</div>';
}

// --- Render episode detail ---
function renderEpisodeDetail(id, ep, item) {
  let html = '';

  // Comparison boxes in top-right corner
  html += renderComparisonBoxes(id, ep);

  // Title + story arc
  html += '<div class="detail-section">';
  html += '<div class="detail-label">Epizoda</div>';
  var detailTitle, detailMiniNum;
  if (item.content) {
    detailTitle = item.content.title;
    detailMiniNum = item.content.miniSeriesNumber;
  } else {
    var oldestDetail = DATA.contents
      .filter(function(c) { return c.episodeId === id; })
      .sort(function(a, b) {
        var ya = a.date ? parseInt(a.date.split('-')[0]) : (DATA.publications[a.publicationId] ? DATA.publications[a.publicationId].year || 9999 : 9999);
        var yb = b.date ? parseInt(b.date.split('-')[0]) : (DATA.publications[b.publicationId] ? DATA.publications[b.publicationId].year || 9999 : 9999);
        return ya - yb;
      })[0];
    detailTitle = oldestDetail ? oldestDetail.title : ep.title;
    detailMiniNum = oldestDetail ? oldestDetail.miniSeriesNumber : null;
  }
  html += '<div class="detail-value"><strong>' + (ep.storyArc ? escHtml(ep.storyArc) + ' – ' : '') + escHtml(detailTitle) + (detailMiniNum ? ' (' + detailMiniNum + ')' : '') + '</strong>';
  html += '</div></div>';

  // Artist
  if (ep.artist && DATA.artists[ep.artist]) {
    html += '<div class="detail-section">';
    html += '<div class="detail-label">Kreslíř</div>';
    const a = DATA.artists[ep.artist];
    html += '<div class="detail-value">' + escHtml(a.firstName + ' ' + a.name) + '</div>';
    html += '</div>';
  }

  // Publications where this specific episode version appears
  const appearances = DATA.contents.filter(c => c.episodeId === id);

  if (appearances.length > 0) {
    // Sort by publication year (null = magazine, sort first by date if available)
    const sorted = [...appearances].sort((a, b) => {
      const pubA = DATA.publications[a.publicationId];
      const pubB = DATA.publications[b.publicationId];
      const yearA = a.date ? parseInt(a.date.split('-')[0]) : (pubA ? pubA.year : 9999);
      const yearB = b.date ? parseInt(b.date.split('-')[0]) : (pubB ? pubB.year : 9999);
      return (yearA || 9999) - (yearB || 9999);
    });

    html += '<div class="detail-section">';
    html += '<div class="detail-label">Vydání</div>';
    html += '<table class="pub-table"><thead><tr>';
    html += '<th>Publikace</th><th>Název</th><th>Pořadí</th>';
    html += '</tr></thead><tbody>';
    for (const app of sorted) {
      const pub = DATA.publications[app.publicationId];
      const pubLabel = pub ? pub.name : app.publicationId;
      // Year: from date or publication year
      const yearStr = app.date ? ' (' + formatDate(app.date) + ')' :
                      (pub && pub.year ? ' (' + pub.year + ')' : '');
      // Order formatting
      let orderStr = '';
      if (app.volume && app.issue) {
        orderStr = 'roč.\u00a0' + app.volume + ', č.\u00a0' + app.issue;
      } else if (app.order) {
        orderStr = app.order + '.';
      }
      var rowColor = PUB_COLORS[app.publicationId] || '';
      html += '<tr' + (rowColor ? ' style="background:' + rowColor + '"' : '') + '>';
      html += '<td>' + escHtml(pubLabel) + yearStr + '</td>';
      html += '<td>' + (app.storyArc ? escHtml(app.storyArc) + ' – ' : '') + escHtml(app.title) + (app.miniSeriesNumber ? ' (' + app.miniSeriesNumber + ')' : '') + '</td>';
      html += '<td>' + orderStr + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  // Related versions (original + variants)
  var relatedRows = [];
  if (ep.originalId) {
    const origEp = DATA.episodes[ep.originalId];
    if (origEp) {
      var origContent = DATA.contents.find(function(c) { return c.episodeId === ep.originalId; });
      var origPubId = origContent ? origContent.publicationId : 'p01';
      var origPub = DATA.publications[origPubId];
      var origYear = origContent && origContent.date ? origContent.date.split('-')[0] : (origPub && origPub.year ? origPub.year : '');
      relatedRows.push({ id: ep.originalId, ep: origEp, type: 'originál', pubName: origPub ? origPub.name : '', year: origYear, pubId: origPubId });
    }
  }
  var variants = Object.entries(DATA.episodes)
    .filter(([vid, vep]) => vep.originalId === id)
    .map(([vid, vep]) => ({ id: vid, ep: vep }));
  for (const v of variants) {
    var vContent = DATA.contents.find(function(c) { return c.episodeId === v.id; });
    var vPubId = vContent ? vContent.publicationId : 'p03';
    var vPub = DATA.publications[vPubId];
    var vYear = vContent && vContent.date ? vContent.date.split('-')[0] : (vPub && vPub.year ? vPub.year : '');
    var vType = v.ep.variantType === 'remake' ? 'remake' :
                v.ep.variantType === 'redrawn' ? 'překreslení' : 'úprava';
    relatedRows.push({ id: v.id, ep: v.ep, type: vType, pubName: vPub ? vPub.name : '', year: vYear, pubId: vPubId });
  }

  if (relatedRows.length > 0) {
    html += '<div class="detail-section">';
    html += '<div class="detail-label">Související verze</div>';
    html += '<table class="pub-table"><thead><tr>';
    html += '<th>Typ</th><th>Název</th><th>Publikace</th><th></th>';
    html += '</tr></thead><tbody>';
    for (const r of relatedRows) {
      var rColor = r.id.endsWith('-abc2') ? PUB_COLORS['p02'] || '' : PUB_COLORS[r.pubId] || '';
      var rArtist = r.ep.artist && DATA.artists[r.ep.artist] ? DATA.artists[r.ep.artist].name : '';
      html += '<tr' + (rColor ? ' style="background:' + rColor + '"' : '') + '>';
      html += '<td>' + escHtml(r.type) + '</td>';
      html += '<td>' + (r.ep.storyArc ? escHtml(r.ep.storyArc) + ' – ' : '') + escHtml(r.ep.title) + (rArtist ? ' <em>(' + escHtml(rArtist) + ')</em>' : '') + '</td>';
      html += '<td>' + escHtml(r.pubName) + (r.year ? ' (' + r.year + ')' : '') + '</td>';
      html += '<td><a href="#' + r.id + '" class="ep-link" data-target="' + r.id + '">zobrazit</a></td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  return html;
}

// --- Render comparison boxes for an episode ---
function renderComparisonBoxes(id, ep) {
  const allRelatedIds = [id];
  if (ep.originalId) {
    allRelatedIds.push(ep.originalId);
    Object.entries(DATA.episodes).forEach(([vid, vep]) => {
      if (vep.originalId === ep.originalId && vid !== id) allRelatedIds.push(vid);
    });
  } else {
    Object.entries(DATA.episodes).forEach(([vid, vep]) => {
      if (vep.originalId === id) allRelatedIds.push(vid);
    });
  }
  const allScreens = [];
  for (const eid of allRelatedIds) {
    const e = DATA.episodes[eid];
    if (!e || !e.screenshots) continue;
    for (const s of e.screenshots) {
      allScreens.push({ file: s.file, source: s.source, comparisonIndex: s.comparisonIndex, episodeId: eid });
    }
  }
  if (allScreens.length === 0) return '';
  const groups = {};
  for (const s of allScreens) {
    const m = s.file.replace('.jpg','').replace('.png','').match(/^(.+?)_(abc2|abc|vks|remake|redrawn)$/);
    const prefix = m ? m[1] : s.file;
    if (!groups[prefix]) groups[prefix] = [];
    groups[prefix].push(s);
  }
  for (const key of Object.keys(groups)) {
    if (!groups[key].some(s => s.episodeId === id)) delete groups[key];
  }
  const sourceOrder = { abc: 1, abc2: 2, vks: 3, remake: 4, redrawn: 5 };
  for (const key of Object.keys(groups)) {
    groups[key].sort((a, b) => {
      const aIsCurrent = a.episodeId === id ? 0 : 1;
      const bIsCurrent = b.episodeId === id ? 0 : 1;
      if (aIsCurrent !== bIsCurrent) return aIsCurrent - bIsCurrent;
      return (sourceOrder[a.source] || 9) - (sourceOrder[b.source] || 9);
    });
  }
  const groupKeys = Object.keys(groups);
  if (groupKeys.length === 0) return '';
  var html = '<div class="ep-comparisons"><div class="detail-label">Srovnání</div><div class="screenshot-groups">';
  var groupIdx = 0;
  var compGroupId = id + '_cmp_';
  for (const key of groupKeys) {
    const groupScreens = groups[key];
    var gid = compGroupId + groupIdx;
    groupIdx++;
    CMP_GROUPS[gid] = groupScreens.map(s => ({ file: s.file, source: s.source }));
    var targetSource = groupScreens.length > 1 ? groupScreens[groupScreens.length - 1].source : groupScreens[0].source;
    var boxColor = PUB_COLORS[SOURCE_PUB[targetSource]] || '';
    html += '<div class="screenshot-row" data-group-id="' + gid + '"' +
      (boxColor ? ' style="background:' + boxColor + '"' : '') + '>';
    html += '<span class="cmp-number">' + groupIdx + '</span>';
    html += '<div class="cmp-labels">';
    for (var si = 0; si < groupScreens.length; si++) {
      if (si > 0) html += ' <span class="cmp-arrow">→</span> ';
      html += escHtml(SOURCE_LABELS[groupScreens[si].source] || groupScreens[si].source);
    }
    html += '</div></div>';
  }
  html += '</div></div>';
  return html;
}

// --- Helpers ---
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return parseInt(d) + '.' + parseInt(m) + '.' + y;
}

// --- Start ---
document.addEventListener('DOMContentLoaded', init);
</script>
